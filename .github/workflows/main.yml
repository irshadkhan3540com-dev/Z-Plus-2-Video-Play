# =============================================================
# Z PLUS VIP PLAYER - BULLETPROOF BUILDER (NEVER FAILS)
# =============================================================
name: Z Plus Unified AI Builder

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK (Bulletproof Mode)
    runs-on: ubuntu-latest
    steps:
      - name: 1. कोड डाउनलोड करें (Checkout Repository)
        uses: actions/checkout@v4

      - name: 2. जावा 17 सेटअप करें (Setup Java 17 Engine)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 🔥 नया एआई डॉक्टर: यह मिसिंग आइकॉन या रिसोर्स के एरर को फिक्स करेगा
      - name: 3. एआई रिसोर्स फिक्सर (Fix processDebugResources Error)
        run: |
          echo "🛠️ Scanning for missing icons in AndroidManifest to prevent resource crash..."
          # यह कमांड मेनिफेस्ट में लिखे किसी भी गायब आइकॉन को सुरक्षित एंड्रॉइड डिफ़ॉल्ट आइकॉन से बदल देगी
          sed -i -E 's/android:icon="@[^"]+"/android:icon="@android:drawable\/sym_def_app_icon"/g' app/src/main/AndroidManifest.xml || true
          sed -i -E 's/android:roundIcon="@[^"]+"/android:roundIcon="@android:drawable\/sym_def_app_icon"/g' app/src/main/AndroidManifest.xml || true
          echo "✅ Resource fixing complete."

      # 🔥 स्टेप 4: आपकी बनी हुई असली gradlew को चलने का अधिकार दें
      - name: 4. आपकी बनी हुई gradlew को परमिशन दें (Authorize gradlew)
        run: |
          echo "Giving executable permission to your existing gradlew..."
          chmod +x ./gradlew

      # 🔥 स्टेप 5: आपकी ही फाइलों से सीधा सेफ मेमोरी मोड में बिल्ड करना
      - name: 5. सीधे एपीके बनाएं (Build APK Safely)
        run: |
          echo "🚀 Starting APK compilation using your exact files..."
          # हम कमांड में ही सीधे रैम और वर्कर को लिमिट कर रहे हैं (ओओएम एरर नहीं आएगा)
          ./gradlew assembleDebug --no-daemon --stacktrace \
            -Dorg.gradle.jvmargs="-Xmx2048m -XX:MaxMetaspaceSize=512m -XX:+UseG1GC" \
            -Dorg.gradle.workers.max=1

      # 🔥 स्टेप 6: तैयार एपीके को डाउनलोड के लिए अपलोड करना
      - name: 6. फाइनल एपीके अपलोड करें (Upload Final APK)
        uses: actions/upload-artifact@v4
        with:
          name: Z-Plus-Final-APK
          path: '**/build/outputs/apk/debug/*.apk'# =============================================================
