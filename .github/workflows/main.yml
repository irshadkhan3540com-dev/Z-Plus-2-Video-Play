# =============================================================
# Z PLUS VIP PLAYER - DIRECT REUSE BUILDER (NO FILE OVERWRITE)
# =============================================================
name: Z Plus Unified AI Builder

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK (Using Existing gradlew)
    runs-on: ubuntu-latest
    steps:
      - name: 1. कोड डाउनलोड करें (Checkout Repository)
        uses: actions/checkout@v4

      - name: 2. जावा 17 सेटअप करें (Setup Java 17 Engine)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 🔥 स्टेप 3: यह सीधे आपके रूट फोल्डर की gradlew को चलने का अधिकार (Permission) देगा
      - name: 3. आपकी बनी हुई gradlew को परमिशन दें (Authorize Existing gradlew)
        run: |
          echo "Giving executable permission to your existing gradlew..."
          chmod +x ./gradlew

      # 🔥 स्टेप 4: आपकी ही फाइलों का इस्तेमाल करके रैम-सुरक्षित मोड में बिल्ड करना
      - name: 4. सीधे एपीके बनाएं (Build APK Safely)
        run: |
          echo "🚀 Starting APK compilation using your exact files..."
          # हम यहाँ किसी भी फाइल को ओवरराइट किए बिना, सीधे कमांड के अंदर रैम और वर्कर को लिमिट कर रहे हैं
          ./gradlew assembleDebug --no-daemon --stacktrace \
            -Dorg.gradle.jvmargs="-Xmx2048m -XX:MaxMetaspaceSize=512m -XX:+UseG1GC" \
            -Dorg.gradle.workers.max=1

      # 🔥 स्टेप 5: तैयार एपीके को डाउनलोड के लिए गिटहब पर अपलोड करना
      - name: 5. फाइनल एपीके अपलोड करें (Upload Final APK)
        uses: actions/upload-artifact@v4
        with:
          name: Z-Plus-Final-APK
          path: '**/build/outputs/apk/debug/*.apk'
