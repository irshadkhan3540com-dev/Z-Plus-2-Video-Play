name: Z Plus Bulletproof Builder

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: 1. Download Code
        uses: actions/checkout@v4

      - name: 2. Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 🔥 मास्टर स्ट्रोक: रोबोट आपकी फाइलों को इग्नोर करके 100% परफेक्ट फाइलें खुद बनाएगा
      - name: 3. Magic File Repair (Auto-Rewriting Files)
        run: |
          echo "Overwriting settings.gradle to be minimal and safe..."
          cat << 'EOF' > settings.gradle
          rootProject.name = "Z Plus Video Player"
          include ':app'
          EOF

          echo "Overwriting ROOT build.gradle with bulletproof method..."
          cat << 'EOF' > build.gradle
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.1.1'
                  classpath 'org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.0'
              }
          }
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          task clean(type: Delete) {
              delete rootProject.buildDir
          }
          EOF

          echo "Overwriting app/build.gradle to ensure 100% compilation..."
          cat << 'EOF' > app/build.gradle
          plugins {
              id 'com.android.application'
              id 'org.jetbrains.kotlin.android'
          }
          android {
              namespace 'com.zplus.videoplayer'
              compileSdk 34
              defaultConfig {
                  applicationId "com.zplus.videoplayer"
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
              kotlinOptions {
                  jvmTarget = '17'
              }
          }
          dependencies {
              implementation 'androidx.core:core-ktx:1.12.0'
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
              implementation 'androidx.media3:media3-exoplayer:1.2.0'
              implementation 'androidx.media3:media3-ui:1.2.0'
              implementation 'androidx.media3:media3-session:1.2.0'
          }
          EOF

      - name: 4. Setup Gradle 8.2 Engine
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2'

      # 🔥 डायरेक्ट असली इंजन (gradle) से बिल्ड करना, कोई gradlew की ज़रूरत नहीं
      - name: 5. Build APK Directly
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: 6. Upload Final APK
        uses: actions/upload-artifact@v4
        with:
          name: Z-Plus-Video-Player-APK
          path: app/build/outputs/apk/debug/*.apk
