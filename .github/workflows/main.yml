name: Z Plus Simple Builder

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: 1. Code Download
        uses: actions/checkout@v4

      - name: 2. Java 17 Setup
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 3. Setup Google Gradle Engine
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2'

      # 🔥 मास्टर कमांड: यहाँ हमने './gradlew' हटा दिया है। 
      # अब यह डायरेक्ट इंटरनेट वाले असली इंजन 'gradle' का इस्तेमाल करेगा।
      # इससे "No such file" वाला एरर जिंदगी में कभी नहीं आएगा।
      - name: 4. Build APK Directly
        run: gradle assembleDebug --stacktrace

      - name: 5. Upload Final APK
        uses: actions/upload-artifact@v4
        with:
          name: Z-Plus-Video-Player-APK
          path: app/build/outputs/apk/debug/*.apk
