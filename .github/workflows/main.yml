name: Z Plus Direct APK Builder

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: 1. Download Code from Repository
        uses: actions/checkout@v4

      - name: 2. Setup Java 17 Engine
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 3. Remove Junk Files (Clean up)
        run: |
          echo "Cleaning up accidentally created junk files..."
          rm -rf "com.android.tools.build:gradle" || true
          rm -f gradlew gradlew.bat

      - name: 4. Setup Gradle 8.2 Engine
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2'

      - name: 5. Create Fresh Starter (Wrapper)
        run: |
          echo "Generating new gradlew for the current folders..."
          gradle wrapper --gradle-version 8.2
          chmod +x gradlew

      - name: 6. Build the APK (Direct & Safe Mode)
        run: |
          echo "Building APK from the 'app' folder..."
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: 7. Upload the Final APK
        uses: actions/upload-artifact@v4
        with:
          name: Z-Plus-VIP-Player-APK
          path: app/build/outputs/apk/debug/*.apk
