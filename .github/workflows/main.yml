name: Z Plus Final Success Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # गिटहब को केवल Gradle 8.2 इस्तेमाल करने के लिए मजबूर करना
      - name: Force Gradle 8.2
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2'

      # बिना किसी एरर के सीधा कमांड लाइन से APK बिल्ड करना
      - name: Build VIP APK
        run: gradle assembleDebug --stacktrace

      # तैयार APK को "Artifacts" में डाउनलोड के लिए अपलोड करना
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Z-Plus-VIP-Player-APK
          path: '**/build/outputs/apk/debug/*.apk'
