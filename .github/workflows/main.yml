name: Z Plus Final Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 🔥 फिक्स: सेटिंग्स और बिल्ड फाइलों का टकराव खत्म करना
      - name: Fix Repository Conflict
        run: |
          # settings.gradle को पूरी तरह अपडेट करना ताकि वह रिपॉजिटरी कंट्रोल ले ले
          cat << 'EOF' > settings.gradle
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "Z Plus Video Player"
          include ':app'
          EOF

          # build.gradle को एकदम क्लीन करना (कोई रिपॉजिटरी नहीं, सिर्फ प्लगइन)
          cat << 'EOF' > build.gradle
          plugins {
              id 'com.android.application' version '8.1.1' apply false
              id 'org.jetbrains.kotlin.android' version '1.9.0' apply false
          }
          EOF

      - name: Build APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Z-Plus-Final-APK
          path: app/build/outputs/apk/debug/*.apk
