name: Z Plus Final Success Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Fix Permission and Build
        run: |
          # यह कमांड पूरे प्रोजेक्ट में gradlew ढूंढेगी और उसे चालू करेगी
          find . -name "gradlew" -exec chmod +x {} \;
          
          # यहाँ हम उस फोल्डर को ढूंढेंगे जिसमें build.gradle है
          PROJECT_ROOT=$(find . -name "build.gradle" -exec dirname {} \; | head -n 1)
          echo "Building in: $PROJECT_ROOT"
          
          cd $PROJECT_ROOT
          
          # ऐप बनाना शुरू करें
          if [ -f "./gradlew" ]; then
            ./gradlew assembleDebug
          else
            gradle assembleDebug
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Z-Plus-VIP-APK
          path: '**/build/outputs/apk/debug/*.apk'
