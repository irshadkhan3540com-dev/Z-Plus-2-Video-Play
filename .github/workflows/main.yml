name: Z Plus VIP Player Final Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # गिटहब को केवल Gradle 8.2 पर सेट करना
      - name: Force Gradle 8.2
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2'

      # 🔥 क्रैश-प्रूफ कमांड: रैम मैनेज करना और डेमन इंजन को बंद रखना
      - name: Build VIP APK (Crash-Proof Memory Mode)
        run: |
          gradle assembleDebug --no-daemon -Dorg.gradle.jvmargs="-Xmx2048m -XX:MaxMetaspaceSize=512m" --stacktrace

      # तैयार APK को "Artifacts" में डालना
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Z-Plus-VIP-Player-APK
          path: '**/build/outputs/apk/debug/*.apk'
