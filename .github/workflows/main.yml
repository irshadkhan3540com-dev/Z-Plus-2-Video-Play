name: Z Plus Video Player Auto Build

# यह बताएगा कि सेव करने पर या बटन दबाने पर रोबोट चालू हो
on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      # 1. गिटहब आपका सारा कोड उठाएगा
      - name: Checkout Project Code
        uses: actions/checkout@v4

      # 2. जावा सेटअप करेगा
      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. 🚀 नईम भाई का आईडिया: गिटहब खुद अपना Gradle इंजन डाउनलोड करेगा!
      # अब ./gradlew फाइल की कोई जरूरत नहीं है।
      - name: Setup Gradle Automatically
        uses: gradle/actions/setup-gradle@v3

      # 4. APK बनाएगा (ध्यान दें: यहाँ ./gradlew हटाकर सिर्फ gradle कर दिया गया है)
      - name: Build the APK
        run: gradle assembleDebug --stacktrace

      # 5. तैयार APK को डाउनलोड के लिए सेव करेगा
      - name: Upload APK for Download
        uses: actions/upload-artifact@v4
        with:
          name: Z-Plus-Player-APK
          path: app/build/outputs/apk/debug/app-debug.apk
