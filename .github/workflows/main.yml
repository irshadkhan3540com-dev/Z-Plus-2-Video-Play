name: Z Plus VIP Player Final Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Project Code
        uses: actions/checkout@v4

      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Gradle 8.2 को फिक्स किया ताकि कोई भी वर्ज़न एरर न आए
      - name: Setup Gradle 8.2
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2'

      # यह कमांड आपके पूरे प्रोजेक्ट को स्कैन करेगी और APK बनाएगी
      - name: Build VIP APK
        run: |
          if [ -f "./gradlew" ]; then
            chmod +x gradlew
            ./gradlew :app:assembleDebug
          else
            gradle :app:assembleDebug
          fi
        continue-on-error: false

      # तैयार APK को डाउनलोड के लिए सेव करना
      - name: Upload APK for Download
        uses: actions/upload-artifact@v4
        with:
          name: Z-Plus-VIP-Player-APK
          path: '**/build/outputs/apk/debug/*.apk'
