name: Z Plus Ultimate AI Builder

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # गिटहब को मजबूत Gradle 8.2 वर्ज़न पर सेट करना
      - name: Setup Gradle 8.2
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2'

      # 🔥 मास्टर कमांड: पुराना सारा कचरा साफ करके बिल्कुल फ्रेश 'gradlew' फाइल खुद बनाना
      - name: Force Clean Wrapper Generation
        run: |
          gradle wrapper --gradle-version 8.2
          chmod +x gradlew

      # 🚀 मेमोरी और वर्ज़न क्रैश-प्रूफ बिल्ड कमांड (Kotlin Daemon को भी बंद किया गया है)
      - name: Build VIP APK (AI Memory Safeguard)
        run: |
          ./gradlew assembleDebug --no-daemon -Dorg.gradle.jvmargs="-Xmx2048m -XX:MaxMetaspaceSize=512m" -Dorg.gradle.kotlin.compiler.daemon=false --stacktrace

      # तैयार एपीके (APK) को डाउनलोड सेक्शन में भेजना
      - name: Upload APK for Download
        uses: actions/upload-artifact@v4
        with:
          name: Z-Plus-VIP-Player-APK
          path: '**/build/outputs/apk/debug/*.apk'
