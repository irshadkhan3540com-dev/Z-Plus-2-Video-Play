name: Z Plus Direct APK Builder

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 🔥 फिक्स: यह स्टेप गिटहब को मजबूर करेगा कि वह गूगल की लाइब्रेरीज़ देखे
      - name: Force Repositories Configuration
        run: |
          mkdir -p .gradle
          echo "android.enableJetifier=true" >> gradle.properties
          echo "android.useAndroidX=true" >> gradle.properties

      # 🔥 फिक्स: Gradle 8.2 को प्रॉपर सेटअप करना
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2'

      # 🔥 मास्टर फिक्स: प्लगइन और लाइब्रेरी के एरर को जड़ से खत्म करना
      - name: Run Build with Google Repos
        run: |
          ./gradlew assembleDebug --no-daemon --stacktrace \
          -Dorg.gradle.jvmargs="-Xmx2048m -XX:MaxMetaspaceSize=512m" \
          -Pandroid.buildToolsVersion=34.0.0

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Z-Plus-VIP-Player-APK
          path: app/build/outputs/apk/debug/*.apk
