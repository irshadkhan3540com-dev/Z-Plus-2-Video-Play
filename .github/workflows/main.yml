name: Final Working Build

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      # हम यहाँ फाइल ढूंढने के लिए एक बहुत ही शक्तिशाली तरीका इस्तेमाल करेंगे
      - name: Build and Locate APK
        run: |
          chmod +x gradlew || true
          ./gradlew assembleDebug || gradle assembleDebug
      
      # यह लाइन सबसे ज़रूरी है: यह कहीं भी APK हो, उसे उठा लेगी
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ZPlus-Final-APK
          path: '**/build/outputs/apk/**/*.apk'
