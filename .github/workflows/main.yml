name: Z Plus VIP Player Final Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # यह कोड आपके पूरे प्रोजेक्ट के अंदर 'app' नाम का फोल्डर ढूंढेगा
      - name: Locate and Build
        run: |
          # यह कमांड पूरे रिपॉजिटरी में उस फोल्डर को ढूंढेगी जिसमें build.gradle है
          APP_DIR=$(find . -name "build.gradle" -exec dirname {} \; | head -n 1)
          echo "Found project at: $APP_DIR"
          cd $APP_DIR
          
          # gradlew ढूंढना और परमिशन देना
          if [ -f "./gradlew" ]; then
            chmod +x gradlew
            ./gradlew assembleDebug
          else
            gradle assembleDebug
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Z-Plus-VIP-Player-APK
          path: '**/build/outputs/apk/debug/*.apk'
