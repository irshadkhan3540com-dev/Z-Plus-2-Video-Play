name: Z Plus Video Player - Auto Build APK

# यह रोबोट तब चालू होगा जब भी आप गिटहब पर कुछ नया सेव (commit) करेंगे
on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: # इससे आप खुद भी बटन दबाकर APK बना सकेंगे

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      # 1. आपके गिटहब से पूरा कोड उठाएगा
      - name: Checkout Project Code
        uses: actions/checkout@v4

      # 2. एंड्रॉइड ऐप बनाने के लिए Java 17 इंस्टॉल करेगा
      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 3. Gradle (ऐप बनाने वाले इंजन) को चालू करने की परमिशन देगा
      - name: Grant Execute Permission for Gradle
        run: chmod +x gradlew

      # 4. आपका Z Plus Video Player (APK) बनाएगा
      - name: Build the Z Plus APK
        run: ./gradlew assembleDebug --stacktrace

      # 5. तैयार हुए APK को डाउनलोड करने के लिए गिटहब पर अपलोड कर देगा
      - name: Upload APK for Download
        uses: actions/upload-artifact@v4
        with:
          name: Z-Plus-Video-Player-App
          path: app/build/outputs/apk/debug/app-debug.apk
