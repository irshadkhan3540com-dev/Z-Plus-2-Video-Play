name: Z Plus Final Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # यह कमांड आपके पूरे प्रोजेक्ट के हर फोल्डर में 'build.gradle' को ढूँढेगी
      - name: Build and Scan All Folders
        run: |
          # जहाँ भी build.gradle मिले, वहीं से बिल्ड शुरू करो
          BUILD_PATH=$(find . -name "build.gradle" -exec dirname {} \;)
          echo "Building in: $BUILD_PATH"
          cd $BUILD_PATH
          # gradlew ढूंढो या खुद बनाओ
          if [ -f "./gradlew" ]; then
            chmod +x gradlew
            ./gradlew assembleDebug
          else
            gradle assembleDebug
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Z-Plus-VIP-Player-APK
          path: '**/build/outputs/apk/debug/*.apk'
